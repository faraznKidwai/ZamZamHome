name: Automated Stock Data Sync

on:
  schedule:
    # Runs at 10:30 AM IST (5:00 AM UTC) and 4:00 PM IST (10:30 AM UTC) Monday to Friday
    - cron: "0 5 * * 1-5"
    - cron: "30 10 * * 1-5"
  workflow_dispatch: # Allows you to also trigger it manually from GitHub anytime

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: "18"

      - name: Fetch Latest Market Data
        run: node scripts/fetchStocks.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/TickerData.json
          git commit -m "Automated Stock Sync: $(date)" || exit 0
          git push
